<div class="container vh-100 d-flex align-items-center justify-content-center">
        
        <div class="card shadow p-4 col-11 col-md-6 col-lg-4">
            <div class="card-body text-center">
                <h3 class="mb-4">Login</h3>
                
                <form  [formGroup]="loginUsersForm">
                        <div class="mb-3 text-start">
                        <div class="form-floating shadow-sm">
                            <input type="email" class="form-control border-0 bg-light rounded-3" id="email"
                                placeholder="email" required formControlName="email" [class.is-invalid]="this.loginUsersForm.get('email')?.invalid && this.loginUsersForm.get('email')?.touched">
                            <label for="email" class="text-muted small fw-normal">Email Address</label>
                        </div>
                        @if(loginUsersForm.get('email')?.hasError('required') &&
                        loginUsersForm.get('email')?.touched) {
                        <div class="invalid-feedback d-block">
                            Email is required.
                        </div>
                        }
                    </div>
            
                         <div class="mb-3 text-start">
                        <div class="form-floating shadow-sm">
                            <input type="password" class="form-control border-0 bg-light rounded-3" id="password"
                                placeholder="Enter Password" required formControlName="password" [class.is.invalid]="this.loginUsersForm.get('password')?.invalid && this.loginUsersForm.get('password')?.touched">
                            <label for="password" class="text-muted small fw-normal">Create Password</label>
                        </div>
                        @if(loginUsersForm.get('password')?.hasError('required') &&
                        loginUsersForm.get('password')?.touched) {
                        <div class="invalid-feedback d-block">
                            password is required.
                        </div>
                        }
                    </div>

                    <div class="d-grid mt-4">
                        <button type="button" class="btn btn-primary" (click)="onLogin()">  Sign In</button>
                    </div>
                </form>

                <p class="mt-3 mb-0 small text-muted">New account? <a routerLink="/studentRegistration">Register </a></p>
            </div>
        </div>

    </div>
